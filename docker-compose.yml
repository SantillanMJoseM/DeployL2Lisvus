version: '3.8'

services:
  mariadb:
    image: mariadb:10.6
    container_name: l2j_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql

  l2j:
    build: ./l2j
    container_name: l2j_server
    depends_on:
      - mariadb
    env_file:
      - .env
    ports:
      - "2106:2106"
      - "7777:7777"
    volumes:
      - ./server:/opt/l2server
    restart: always

volumes:
  db_data: